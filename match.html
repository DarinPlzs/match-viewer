<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Match Viewer</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .team {
      flex: 1;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .blue {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    }

    .red {
      background: linear-gradient(135deg, #7f1d1d, #ef4444);
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .gold {
      color: #facc15;
      font-size: 14px;
    }

    .player {
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .player:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
    }

    .mvp {
      border: 2px solid gold;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .name {
      font-weight: bold;
    }

    .hero {
      font-size: 13px;
      opacity: 0.9;
    }

    .kda {
      font-size: 13px;
    }

    .items {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .hero-img {
      width: 36px;
      vertical-align: middle;
      margin-right: 6px;
    }

    .item-img {
      width: 28px;
      border-radius: 4px;
      background: #111;
    }
  </style>

</head>

<body>

<h1>🏆 Match Viewer</h1>

<div class="container">
  <div id="blueTeam" class="team blue"></div>
  <div id="redTeam" class="team red"></div>
</div>

<script>

// 🔗 ดึง id จาก URL
const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");

if (!matchId) {
  document.body.innerHTML = "<h1>❌ No match id</h1>";
  throw new Error("No match id");
}

// 📦 โหลด JSON
fetch(`data/matches/${matchId}.json`)
  .then(res => res.json())
  .then(data => {

    const blue = data.players.filter(p => p.team.trim().toLowerCase() === "blue");
    const red = data.players.filter(p => p.team.trim().toLowerCase() === "red");

    // 👑 MVP (kills เยอะสุด)
    const mvp = data.players.reduce((a, b) =>
      (a.kda.kills > b.kda.kills ? a : b)
    );

    function renderTeam(team, elementId, teamName, gold) {
      const el = document.getElementById(elementId);

      if (team.length === 0) {
        el.innerHTML = "<p>No data</p>";
        return;
      }

      el.innerHTML = `
        <div class="header">
          <h2>${teamName}</h2>
          <div class="gold">💰 Gold: ${gold}</div>
        </div>
      `;

      team.forEach(p => {

        const isMVP = p.player_id === mvp.player_id;

        // 🧠 HERO IMG (กัน loop แล้ว)
        const heroImg = `
          <img class="hero-img"
               src="Assets/heroes/${p.hero}.png"
               onerror="this.onerror=null; this.src='Assets/heroes/default.png';">
        `;

        // 🧠 ITEMS IMG (กัน loop แล้ว)
        const itemsHTML = p.items
          .filter(i => i)
          .map(i => `
            <img class="item-img"
                 src="Assets/items/${i}.png"
                 onerror="this.onerror=null; this.src='Assets/items/default.png';">
          `)
          .join("");

        el.innerHTML += `
          <div class="player ${isMVP ? 'mvp' : ''}">
            <div class="top">
              <div>
                <div class="name">${p.name}</div>
                <div class="hero">${heroImg}${p.hero}</div>
              </div>

              <div class="kda">
                ${p.kda.kills}/${p.kda.deaths}/${p.kda.assists}
              </div>
            </div>

            <div class="items">
              ${itemsHTML}
            </div>
          </div>
        `;
      });
    }

    renderTeam(
      blue,
      "blueTeam",
      "🔵 BLUE TEAM",
      data.team_summary.blue.gold
    );

    renderTeam(
      red,
      "redTeam",
      "🔴 RED TEAM",
      data.team_summary.red.gold
    );

  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML = "<h1>❌ Error loading match</h1>";
  });

</script>

</body>
</html>
